services:
  - type: web
    name: uniconnect-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: static
    name: uniconnect-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/public
